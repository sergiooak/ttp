<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTP preview</title>

    <link rel="preload" href="./fonts/Impact.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="./fonts/AppleColorEmoji.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="./fonts/NotoColorEmoji.ttf" as="font" type="font/ttf" crossorigin />

    <link rel="stylesheet" href="./ttp.css" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        padding: 2rem 1rem;
        box-sizing: border-box;
      }
      h1 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 600;
      }
      /* Checkerboard so the transparent sticker is visible while editing. */
      .stage {
        background-color: #ccc;
        background-image: linear-gradient(45deg, #999 25%, transparent 25%),
          linear-gradient(-45deg, #999 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #999 75%),
          linear-gradient(-45deg, transparent 75%, #999 75%);
        background-size: 24px 24px;
        background-position: 0 0, 0 12px, 12px -12px, -12px 0;
        border-radius: 8px;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        align-items: flex-start;
        max-width: 512px;
        width: 100%;
      }
      .controls label {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        font-size: 0.8rem;
      }
      textarea {
        flex: 1 1 100%;
        min-height: 4.5rem;
        font: inherit;
        padding: 0.5rem;
        resize: vertical;
      }
      .meta {
        font-size: 0.8rem;
        opacity: 0.7;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>

  <body>
    <h1>Text-To-Picture — local preview</h1>

    <div class="stage">
      <main id="ttp"></main>
    </div>

    <div class="controls">
      <textarea id="text" placeholder="Text (top text in 'both' mode)…"></textarea>
      <textarea id="bottomText" placeholder="Bottom text (only used in 'both' mode)…" hidden></textarea>
      <label>
        Mode
        <select id="mode">
          <option value="center">center</option>
          <option value="top">top</option>
          <option value="bottom">bottom (subtitle)</option>
          <option value="both">both</option>
          <option value="split">split</option>
        </select>
      </label>
      <label>
        Fill
        <input type="color" id="color" value="#ffffff" />
      </label>
      <label>
        Outline
        <input type="color" id="strokeColor" value="#000000" />
      </label>
      <span class="meta" id="meta"></span>
    </div>

    <script type="module">
      import { render, MODES, WORD_BREAK_RATIO, WORD_BREAK_ENTROPY } from "./ttp.js";

      const el = document.getElementById("ttp");
      const textInput = document.getElementById("text");
      const bottomInput = document.getElementById("bottomText");
      const modeInput = document.getElementById("mode");
      const colorInput = document.getElementById("color");
      const strokeInput = document.getElementById("strokeColor");
      const meta = document.getElementById("meta");
      const MEME_PHRASES = [        
        'calma calabreso',       
        'que isso, meu filho, calma',        
        'ô loco, meu',
        'o pai tá on',
        'simplesmente intankável',
        'agora eu se consagro',
        'tankei foi nada',
        'o miserável é um gênio',
        'aí é complicado',
        'me ajuda a te ajudar',
        'cada cachorro que lamba sua caceta',
        'eu não tanko',
        'pode isso, arnaldo?',
        'hoje não, faro',
        'chama no probleminha',
        'o sistema é bruto',
        'segue o líder',
        'isso aí é elite',
        'aceita que dói menos',
        'tá tranquilo, tá favorável',
        'é cilada, bino',
        'que fase...',
        'pelo amor de deus',
        'zero condições',
        'não ironicamente',
        'absolute cinema',
      ]

      function randomDefaultText() {
        return MEME_PHRASES[Math.floor(Math.random() * MEME_PHRASES.length)];
      }

      const DEFAULTS = {
        text: randomDefaultText(),
        mode: "center",
        color: "#ffffff",
        strokeColor: "#000000",
      };
      const OWNED_PARAMS = ["text", "topText", "bottomText", "mode", "color", "strokeColor"];
      let urlSyncTimer = 0;

      function normalizeMode(mode) {
        return MODES.includes(mode) ? mode : DEFAULTS.mode;
      }

      function readStateFromUrl(params) {
        return {
          text: params.get("text") ?? DEFAULTS.text,
          topText: params.get("topText") ?? "",
          bottomText: params.get("bottomText") ?? "",
          mode: normalizeMode(params.get("mode") || DEFAULTS.mode),
          color: params.get("color") || DEFAULTS.color,
          strokeColor: params.get("strokeColor") || DEFAULTS.strokeColor,
        };
      }

      function applyStateToControls(state) {
        modeInput.value = state.mode;
        colorInput.value = state.color;
        strokeInput.value = state.strokeColor;
        textInput.value = state.mode === "both" ? state.topText : state.text;
        bottomInput.value = state.bottomText;
      }

      function stateFromControls() {
        const mode = normalizeMode(modeInput.value);
        return {
          text: textInput.value,
          topText: mode === "both" ? textInput.value : "",
          bottomText: mode === "both" ? bottomInput.value : "",
          mode,
          color: colorInput.value,
          strokeColor: strokeInput.value,
        };
      }

      function writeStateToUrl(state) {
        const params = new URLSearchParams(location.search);
        for (const key of OWNED_PARAMS) params.delete(key);

        if (state.mode !== DEFAULTS.mode) params.set("mode", state.mode);
        if (state.color !== DEFAULTS.color) params.set("color", state.color);
        if (state.strokeColor !== DEFAULTS.strokeColor) params.set("strokeColor", state.strokeColor);

        if (state.mode === "both") {
          if (state.topText) params.set("topText", state.topText);
          if (state.bottomText) params.set("bottomText", state.bottomText);
        } else if (state.text && state.text !== DEFAULTS.text) {
          params.set("text", state.text);
        }

        const query = params.toString();
        const nextUrl = `${location.pathname}${query ? `?${query}` : ""}${location.hash}`;
        history.replaceState(null, "", nextUrl);
      }

      function scheduleUrlSync() {
        clearTimeout(urlSyncTimer);
        urlSyncTimer = setTimeout(() => writeStateToUrl(stateFromControls()), 150);
      }

      async function update() {
        const mode = modeInput.value;
        bottomInput.hidden = mode !== "both";

        const opts = { mode, color: colorInput.value, strokeColor: strokeInput.value };
        if (mode === "both") {
          opts.topText = textInput.value;
          opts.bottomText = bottomInput.value;
        } else {
          opts.text = textInput.value;
        }

        const { size, stroke, wordBreak, ratio, entropy } = await render(el, opts);
        meta.textContent = `mode: ${mode} · size: ${size.toFixed(1)}px · stroke: ${stroke.toFixed(1)}px · ratio: ${ratio}/${WORD_BREAK_RATIO} · entropy: ${entropy}/${WORD_BREAK_ENTROPY}${wordBreak ? " · BREAK" : ""}`;
      }

      for (const input of [textInput, bottomInput, modeInput, colorInput, strokeInput]) {
        input.addEventListener("input", () => {
          update();
          scheduleUrlSync();
        });
      }

      applyStateToControls(readStateFromUrl(new URLSearchParams(location.search)));
      update();
      writeStateToUrl(stateFromControls());
    </script>
  </body>
</html>
